<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的全能仪表盘 | My Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="petal-container"></div>

    <div class="top-controls">
        <button class="mini-lang-btn" onclick="toggleLanguage()" id="langBtnText">EN</button>
        <div class="score-board" onclick="toggleStore()" title="点击打开奖励商城">
            <span id="textScore">✨ 积分: </span><span id="scoreDisplay">0</span> 🎁
        </div>
    </div>

    <div class="main-layout">
        <div class="left-column">
            <div class="dashboard-panel">
                <div class="header-section">
                    <h2 id="textDailyTitle">📅 每日任务池</h2>
                    <select id="daySelector" onchange="changeDay()">
                        <option value="Monday">星期一</option>
                        <option value="Tuesday">星期二</option>
                        <option value="Wednesday">星期三</option>
                        <option value="Thursday">星期四</option>
                        <option value="Friday">星期五</option>
                        <option value="Saturday">星期六</option>
                        <option value="Sunday">星期日</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="text" id="dailyInput" placeholder="输入待办任务..." onkeypress="if(event.key === 'Enter') addDailyTask()">
                    <button id="btnAddDaily" onclick="addDailyTask()">添加</button>
                </div>
                <div class="drag-hint" id="textDragHint">💡 提示：按住任务可以拖拽到右侧时间轴</div>
                <ul id="dailyList"></ul>
            </div>

            <div class="dashboard-panel project-panel">
                <h2 id="textProjectTitle">🚀 长期计划</h2>
                <div class="input-group">
                    <input type="text" id="projectInput" placeholder="目标...">
                    <input type="date" id="projectDdl">
                    <button id="btnBuildProj" onclick="addProject()">建立</button>
                </div>
                <ul id="projectList"></ul>

                <div class="config-tools">
                    <button class="btn-tool" id="btnSettings" onclick="openSettings()">⚙️ 我的课表管理</button>
                    <div class="tool-group">
                        <button class="btn-tool-small" id="btnBackup" onclick="exportConfig()" title="导出 JSON 配置">📤 备份数据</button>
                        <label class="btn-tool-small btn-upload" title="导入 JSON 配置">
                            <span id="textRestore">📥 恢复数据</span> <input type="file" id="importFile" onchange="importConfig(event)" accept=".json" style="display:none;"/>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-column dashboard-panel timeline-panel">
            <h2 id="textTimelineTitle">⏱️ 今日时间轴</h2>
            <div class="timeline-container" id="timelineContainer"></div>
        </div>
    </div>

    <div id="storeModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="toggleStore()">×</button>
            <div class="modal-header">
                <h3 id="textStoreTitle">🎁 奖励兑换中心</h3>
            </div>
            <div id="storeList" class="store-grid"></div>
        </div>
    </div>

    <div id="settingsModal" class="modal-overlay hidden">
        <div class="modal-content settings-content">
            <button class="close-btn" onclick="closeSettings()">×</button>
            <div class="modal-header">
                <h3 id="textSettingsTitle">⚙️ 课表排版引擎</h3>
            </div>
            
            <select id="settingRepeat" onchange="toggleSettingDay()">
                    <option value="single">单次 (仅特定日期)</option>
                    <option value="workday">工作日重复 (周一至周五)</option>
                    <option value="weekend">周末重复 (周六至周日)</option>
                    <option value="everyday">每天重复</option>
                    <option value="custom">自定义 (多选)</option> </select>

                <select id="settingDay" onchange="renderSettingCourses()">
                    <option value="Monday">星期一</option>
                    <option value="Tuesday">星期二</option>
                    <option value="Wednesday">星期三</option>
                    <option value="Thursday">星期四</option>
                    <option value="Friday">星期五</option>
                    <option value="Saturday">星期六</option>
                    <option value="Sunday">星期日</option>
                </select>

                <div id="customDaysWrapper" class="custom-days-group" style="display: none;">
                    <label><input type="checkbox" value="Monday" class="custom-day-cb"> <span class="cb-lbl">一</span></label>
                    <label><input type="checkbox" value="Tuesday" class="custom-day-cb"> <span class="cb-lbl">二</span></label>
                    <label><input type="checkbox" value="Wednesday" class="custom-day-cb"> <span class="cb-lbl">三</span></label>
                    <label><input type="checkbox" value="Thursday" class="custom-day-cb"> <span class="cb-lbl">四</span></label>
                    <label><input type="checkbox" value="Friday" class="custom-day-cb"> <span class="cb-lbl">五</span></label>
                    <label><input type="checkbox" value="Saturday" class="custom-day-cb"> <span class="cb-lbl">六</span></label>
                    <label><input type="checkbox" value="Sunday" class="custom-day-cb"> <span class="cb-lbl">日</span></label>
                </div>

                <input type="text" id="courseName" placeholder="课程名称 (例: 高等数学)">
                
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="time" id="courseStartTime" style="flex: 1;" required>
                    <span style="color:#8e8e93; font-size:14px; font-weight:bold;">至</span>
                    <input type="time" id="courseEndTime" style="flex: 1;" required>
                </div>
                
                <button class="btn-push" id="btnAddCourse" style="width: 100%; margin-top: 10px;" onclick="saveCourse()">➕ 批量添加至时间轴</button>
            </div>

            <div class="setting-list-header" id="textExistingClasses">当前预览日已有课程：</div>
            <ul id="settingCourseList" class="setting-course-list"></ul>
        </div>
    </div>

    <script src="schedule.js"></script>
    <script src="script.js"></script>
</body>
</html>
