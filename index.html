<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的全能仪表盘 | My Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="petal-container"></div>

    <div class="top-controls">
        <button class="mini-lang-btn" onclick="toggleLanguage()" id="langBtnText">EN</button>
        <div class="score-board" onclick="toggleStore()" title="点击打开奖励商城">
            <span id="textScore">✨ 积分: </span><span id="scoreDisplay">0</span> 🎁
        </div>
    </div>

    <div class="main-layout">
        <div class="left-column">
            <div class="dashboard-panel">
                <div class="header-section">
                    <h2 id="textDailyTitle">📅 每日任务池</h2>
                    <select id="daySelector" onchange="changeDay()">
                        <option value="Monday" id="optMon">星期一</option>
                        <option value="Tuesday" id="optTue">星期二</option>
                        <option value="Wednesday" id="optWed">星期三</option>
                        <option value="Thursday" id="optThu">星期四</option>
                        <option value="Friday" id="optFri">星期五</option>
                        <option value="Saturday" id="optSat">星期六</option>
                        <option value="Sunday" id="optSun">星期日</option>
                    </select>
                </div>
                <div class="input-group">
                    <input type="text" id="dailyInput" placeholder="输入待办任务..." onkeypress="if(event.key === 'Enter') addDailyTask()">
                    <button id="btnAddDaily" onclick="addDailyTask()">添加</button>
                </div>
                <div class="drag-hint" id="textDragHint">💡 提示：按住任务可以拖拽到右侧时间轴</div>
                <ul id="dailyList"></ul>
            </div>

            <div class="dashboard-panel project-panel">
                <h2 id="textProjectTitle">🚀 长期计划</h2>
                <div class="input-group">
                    <input type="text" id="projectInput" placeholder="目标...">
                    <input type="date" id="projectDdl">
                    <button id="btnBuildProj" onclick="addProject()">建立</button>
                </div>
                <ul id="projectList"></ul>

                <div class="config-tools">
                    <a href="config.html" class="btn-config-link">⚙️ 制作我的课表</a>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <button onclick="exportConfig()" class="btn-mini-tool">📤 备份</button>
                        <label class="btn-mini-tool" style="background:#e67e22; cursor:pointer;">
                            📥 恢复 <input type="file" id="importFile" onchange="importConfig(event)" style="display:none;"/>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-column dashboard-panel timeline-panel">
            <h2 id="textTimelineTitle">⏱️ 今日时间轴</h2>
            <div class="timeline-container" id="timelineContainer"></div>
        </div>
    </div>

    <div id="storeModal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn" onclick="toggleStore()">×</button>
            <div class="modal-header">
                <h3 id="textStoreTitle">🎁 奖励兑换中心</h3>
            </div>
            <div id="storeList" class="store-grid"></div>
        </div>
    </div>

    <script src="schedule.js"></script>
    <script src="script.js"></script>
</body>
</html>
