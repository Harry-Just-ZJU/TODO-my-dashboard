<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>配置生成器 | Schedule Builder</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .config-box { max-width: 600px; margin: 40px auto; padding: 40px; }
        textarea { width: 100%; height: 200px; margin-top: 20px; font-family: monospace; border-radius: 10px; padding: 10px; }
        .nav-btns { margin-top: 20px; display: flex; gap: 10px; }
    </style>
</head>
<body>
    <div class="config-box dashboard-panel">
        <h2>🛠️ 课表配置生成器</h2>
        <p>在这里快速填好你的配置，然后下载文件。</p>
        <div id="step1">
            <p>1. 输入你的名字：</p>
            <input type="text" id="cfgName" style="width:100%" placeholder="Harry">
            <button onclick="generateJSON()" style="margin-top:20px;">生成配置代码</button>
        </div>
        <div id="step2">
            <textarea id="jsonOutput" readonly></textarea>
            <div class="nav-btns">
                <button onclick="downloadCfg()">💾 下载配置文件</button>
                <a href="index.html" style="color:#a18cd1; text-decoration:none; padding-top:10px;">返回首页</a>
            </div>
        </div>
    </div>
    <script>
        function generateJSON() {
            const name = document.getElementById('cfgName').value || "User";
            const template = {
                schedule: {
                    Monday: { classes: [], tasks: [] },
                    Tuesday: { classes: [], tasks: [] },
                    Wednesday: { classes: [], tasks: [] },
                    Thursday: { classes: [], tasks: [] },
                    Friday: { classes: [{text: "示例课程", startHour: 9, endHour: 11}], tasks: [] },
                    Saturday: { classes: [], tasks: [] },
                    Sunday: { classes: [], tasks: [] }
                },
                projects: [{ title: name + " 的首个目标", progress: 0 }],
                score: 0
            };
            document.getElementById('jsonOutput').value = JSON.stringify(template, null, 4);
        }
        function downloadCfg() {
            const data = document.getElementById('jsonOutput').value;
            const blob = new Blob([data], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = "schedule_config.json"; a.click();
        }
    </script>
</body>
</html>
